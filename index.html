<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通執法工具箱</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --sidebar-bg: #000000;
            --text-color: #e0e0e0;
            --accent-color: #007aff;
            --highlight: #ffcc00;
        }

        body {
            font-family: -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
        }

        /* 左側側邊欄 */
        .sidebar {
            width: 240px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            position: fixed;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            text-align: center;
        }

        /* 搜尋框樣式 */
        .search-container {
            padding: 10px 15px;
        }

        #lawSearch {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        #lawSearch:focus {
            border-color: var(--accent-color);
        }

        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent-color);
        }

        /* 主內容區 */
        .main-content {
            margin-left: 240px;
            padding: 25px;
            width: calc(100% - 240px);
            min-height: 100vh;
        }

        .law-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 5px solid var(--highlight);
            transition: transform 0.1s;
        }

        .law-no {
            color: var(--highlight);
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .law-text {
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .loading-spinner {
            text-align: center;
            margin-top: 100px;
            color: #888;
        }

        /* 隱藏不符合搜尋條件的卡片 */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">交通執法助手</div>
        
        <div class="search-container">
            <input type="text" id="lawSearch" placeholder="搜尋條號 (如: 43)..." onkeyup="filterLaws()">
        </div>

        <div class="menu-item" onclick="showCalc()">計算工具</div>
        <div class="menu-item active" onclick="fetchLaw()">處罰條例</div>
    </div>

    <div class="main-content" id="display-area">
        <div class="loading-spinner">請稍候，正在取得最新法條資料...</div>
    </div>

    <script>
        let allArticles = []; // 儲存抓取到的法條暫存

        async function fetchLaw() {
            const display = document.getElementById('display-area');
            display.innerHTML = '<div class="loading-spinner">📡 正在同步全國法規資料庫...</div>';

            try {
                // 串接法務部 API
                const response = await fetch('https://law.moj.gov.tw/api/Law/GetLawAll?PCode=K0040012');
                const data = await response.json();
                allArticles = data.LawArticles;
                renderLaws(allArticles);
            } catch (error) {
                display.innerHTML = `
                    <div style="color: #ff6b6b; background: #2a1010; padding: 20px; border-radius: 8px;">
                        <strong>連線失敗</strong><br>
                        可能是公司網路封鎖了政府 API 網域。請嘗試使用個人熱點，或直接訪問官方網站。
                    </div>`;
            }
        }

        function renderLaws(articles) {
            const display = document.getElementById('display-area');
            let html = '<h1>道路交通管理處罰條例</h1>';
            
            articles.forEach(item => {
                html += `
                    <div class="law-card" data-no="${item.ArticleNo}">
                        <div class="law-no">${item.ArticleNo}</div>
                        <div class="law-text">${item.ArticleContent.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            });
            display.innerHTML = html;
        }

        // 搜尋過濾功能
        function filterLaws() {
            const input = document.getElementById('lawSearch').value.toLowerCase();
            const cards = document.getElementsByClassName('law-card');

            for (let card of cards) {
                const articleNo = card.getAttribute('data-no').toLowerCase();
                // 判斷條號是否包含輸入的文字
                if (articleNo.includes(input)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            }
        }

        function showCalc() {
            document.getElementById('display-area').innerHTML = '<h1>計算工具</h1><p>（請在此處嵌入您的 A1/A2 統計與超載計算代碼）</p>';
        }

        // 初始化載入
        window.onload = fetchLaw;
    </script>
</body>
</html>
