<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小港交通分隊勤務工具</title>
    <style>
        /* 法規頂部資訊 */
.law-info-header {
    background: var(--card-bg);
    border-left: 5px solid var(--accent-color);
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 8px;
    text-align: left;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.law-date-row {
    font-size: 0.85rem;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    opacity: 0.8;
    margin-top: 5px;
}

/* 大標題（第一章等） */
.law-chapter-header {
    width: 100%;
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--accent-color);
    margin: 25px 0 15px 0;
    padding: 10px 0;
    border-top: 1px solid var(--border-color);
    border-bottom: 1px solid var(--border-color);
}

/* 法條卡片與項次 */
.law-card-box {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    margin-bottom: 15px;
    text-align: left;
}
.law-no-header {
    background: var(--input-bg);
    padding: 8px 15px;
    font-weight: bold;
    color: var(--accent-color);
    border-bottom: 1px solid var(--border-color);
}
.law-item-row {
    display: flex;
    padding: 5px 15px;
    line-height: 1.6;
}
.item-num {
    color: var(--accent-color);
    font-weight: bold;
    margin-right: 8px;
    flex-shrink: 0;
}
.law-sub-row {
    padding: 2px 15px 2px 38px;
    font-size: 0.95em;
    opacity: 0.9;
}

        
        
        
        /* 完全自定義顏色，不讀取外部 CSS */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #8ab4f8;
            --input-bg: #3d3d3d;
            --border-color: #444444;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f2;
            --card-bg: #ffffff;
            --text-color: #333333;
            --input-bg: #fafafa;
            --border-color: #dddddd;
        }

        body { 
            font-family: sans-serif; /* 使用系統內建字體，避免呼叫 Google Fonts */
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            transition: 0.3s; 
            overflow-x: hidden; 
            touch-action: pan-y; 
        }
        
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: var(--card-bg); box-shadow: 0 2px 8px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--accent-color); padding: 5px; }
        .theme-toggle { font-size: 20px; cursor: pointer; padding: 5px; }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card-bg); box-shadow: 5px 0 15px rgba(0,0,0,0.5); transition: 0.3s; z-index: 1000; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 18px 25px; font-size: 16px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; }
        .sidebar-item:active { background: var(--input-bg); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .page { display: none; padding: 20px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .page.active { display: flex; }
        .card { background: var(--card-bg); padding: 22px; border-radius: 16px; width: 100%; max-width: 400px; margin-bottom: 20px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        h2 { margin-top: 0; font-size: 18px; color: var(--accent-color); border-left: 5px solid var(--accent-color); padding-left: 12px; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; opacity: 0.8; }
        input, select { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 16px; background: var(--input-bg); color: var(--text-color); box-sizing: border-box; outline: none; }
        
        button { width: 100%; padding: 15px; background-color: var(--accent-color); color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .result-box { margin-top: 15px; padding: 15px; background: var(--input-bg); border-radius: 10px; border: 1px dashed var(--border-color); }
        .res-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 16px; }
        .val-text { color: #ffab40; font-weight: bold; }
        #fine-detail { font-size: 14px; color: #a0a0a0; margin-top: 5px; border-top: 1px solid #444; padding-top: 5px; }
        /* 法條容器優化 */
        #law-container {
            text-align: left;
            line-height: 1.8;
        }
        
        .law-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
            background: var(--input-bg);
            border-radius: 8px;
        }
        
        .law-no-title {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1em;
            display: block;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }
        
        .law-content {
            font-size: 15px;
            white-space: pre-wrap; /* 保持原始 JSON 中的換行 */
            word-wrap: break-word;
        }
        
        /* 針對「款」進行自動縮排 (如果是以一、二、三開頭) */
        .law-content-line {
            display: block;
            padding-left: 2em;
            text-indent: -2em;
            margin-bottom: 4px;
        }
                /* 法條卡片外框 */
        .law-card-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            text-align: left;
        }
        
        /* 條號標題 (如：第 43 條) */
        .law-no-header {
            background: var(--input-bg);
            padding: 8px 15px;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
        }
        
        .law-body-content {
            padding: 10px 15px;
        }
        
        /* 「項」的整行樣式 */
        .law-item-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        /* 圓圈數字樣式 */
        .item-num {
            color: var(--accent-color);
            font-weight: bold;
            margin-right: 8px;
            flex-shrink: 0; /* 防止數字被擠壓 */
            font-size: 1.1em;
        }
        
        /* 「款」的縮排樣式 (一、二、三...) */
        .law-sub-row {
            padding-left: 28px; /* 留出空間對齊上面的文字 */
            margin-bottom: 4px;
            opacity: 0.9;
            font-size: 0.95em;
        }
               /* 大標題專用樣式 */
        .law-chapter-header {
            width: 100%;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 30px 0 15px 0;
            padding: 10px 0;
            /* 這裡只給上下底線，不給框 */
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            background: transparent; 
        }
        
        /* 調整原本卡片的間距 */
        .law-card-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body data-theme="dark">

    <div class="navbar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div style="font-weight:bold; letter-spacing: 1px;">小港交通分隊</div>
        <div class="theme-toggle" onclick="toggleTheme()" id="theme-icon">☀️</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" onclick="showPage('home')">🏠 勤務首頁 (日期/年齡)</div>
        <div class="sidebar-item" onclick="showPage('fps')">⏱️ 時速換算 (FPS)</div>
        <div class="sidebar-item" onclick="showPage('skid')">🚗 車速換算 (煞車痕)</div>
        <div class="sidebar-item" onclick="showPage('overload')">🚚 超載計算器</div>
        <div class="sidebar-item" onclick="showLawPage()">⚖️ 處罰條例查詢</div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div id="home" class="page active">
        <div class="card">
            <h2>一、到案日期試算</h2>
            <div class="input-group">
                <label>舉發日期 (民國，如 1150323)</label>
                <input type="number" id="cite-date" placeholder="預設今日" oninput="updateDates()">
            </div>
            <div class="result-box">
                <div class="res-row"><span>30天到案：</span><span id="date-30" class="val-text">-</span></div>
                <div class="res-row"><span>45天到案：</span><span id="date-45" class="val-text">-</span></div>
            </div>
        </div>
        <div class="card">
            <h2>二、年齡計算</h2>
            <div class="input-group">
                <label>出生年月日 (民國，如 0810108)</label>
                <input type="number" id="birth-date" oninput="updateAge()">
            </div>
            <div class="result-box">
                <div class="res-row"><span>當前年齡：</span><span id="age-result" class="val-text">?</span> 歲</div>
            </div>
        </div>
    </div>

    <div id="fps" class="page">
        <div class="card">
            <h2>⏱️ 時速換算 (FPS)</h2>
            <div class="input-group"><label>距離 (m)</label><input type="number" id="d_fps"></div>
            <div class="input-group"><label>總格數</label><input type="number" id="g_fps"></div>
            <div class="input-group"><label>每秒格數</label><input type="number" id="s_fps" value="30"></div>
            <button onclick="calcFPS()">換算</button>
            <div class="result-box">時速結果：<span id="res_fps" class="val-text">0</span> km/hr</div>
        </div>
    </div>

    <div id="skid" class="page">
        <div class="card" style="border-top-color: #34C759;">
            <h2>🚗 車速換算 (煞車痕)</h2>
            <div class="input-group">
                <label>路面摩擦係數參考 (f)</label>
                <select id="f_skid_select">
                    <optgroup label="瀝青路面">
                        <option value="0.85">瀝青乾燥 (新築) 0.85</option>
                        <option value="0.75" selected>瀝青乾燥 (1-3年) 0.75</option>
                        <option value="0.70">瀝青乾燥 (3年以上) 0.70</option>
                        <option value="0.80">瀝青潮濕 (新築) 0.80</option>
                        <option value="0.65">瀝青潮濕 (1-3年) 0.65</option>
                        <option value="0.60">瀝青潮濕 (3年以上) 0.60</option>
                    </optgroup>
                    <optgroup label="混凝土路面">
                        <option value="0.90">混凝土乾燥 (新築) 0.90</option>
                        <option value="0.78">混凝土乾燥 (1-3年) 0.78</option>
                        <option value="0.70">混凝土乾燥 (3年以上) 0.70</option>
                        <option value="0.78">混凝土潮濕 (新築) 0.78</option>
                        <option value="0.70">混凝土潮濕 (1-3年) 0.70</option>
                        <option value="0.62">混凝土潮濕 (3年以上) 0.62</option>
                    </optgroup>
                    <optgroup label="其他">
                        <option value="0.68">砂石路面 0.68</option>
                    </optgroup>
                </select>
            </div>
            <div class="input-group"><label>煞車痕長度 (m)</label><input type="number" id="d_skid" inputmode="decimal"></div>
            <button onclick="calcSkid()" style="background:#34C759; color:white;">計算</button>
            <div class="result-box">估計時速：<span id="res_skid" class="val-text" style="color:#34C759">0</span> km/hr</div>
        </div>
    </div>

    <div id="overload" class="page">
        <div class="card" style="border-top-color: #FF3B30;">
            <h2>🚚 超載計算器</h2>
            <div class="input-group"><label>實際總重 (公噸)</label><input type="number" id="w_act" inputmode="decimal"></div>
            <div class="input-group"><label>核定總重 (公噸)</label><input type="number" id="w_lim" inputmode="decimal"></div>
            <button onclick="calcOver()" style="background:#FF3B30; color:white;">判定</button>
            <div id="res_over" class="result-box" style="display:none;">
                <div class="res-row"><span>狀態：</span><span id="o_status" class="val-text"></span></div>
                <div class="res-row" id="fine-row" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; display: none;">
                    <span>應處罰鍰：</span><span id="o_fine" class="val-text" style="color: #ff5252; font-size: 18px;">-</span>
                </div>
                <div id="fine-detail" style="display: none;"></div>
                <div id="o_law" style="font-size:14px; margin-top:10px; color:#ffab40; line-height:1.6; border-top: 1px solid #444; padding-top: 10px;"></div>
            </div>
        </div>
    </div>

    <div id="law-page" class="page">
    <div class="card" style="max-width: 600px;">
        <h2>⚖️ 處罰條例查詢</h2>
        <input type="text" id="law-search-box" placeholder="輸入條號 (如: 43)..." onkeyup="filterLaws()" style="margin-bottom: 15px;">
        <div id="law-container" style="max-height: 60vh; overflow-y: auto;">
            <div class="loading">請點選側邊欄載入法條...</div>
        </div>
    </div>
</div>
<script>
    // 側邊選單手勢
    let touchStartX = 0;
    let touchEndX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
    document.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        const threshold = 100;
        if (touchEndX - touchStartX > threshold) toggleMenu(true);
        if (touchStartX - touchEndX > threshold) toggleMenu(false);
    }, false);

    function toggleMenu(forceState) {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const isActive = (typeof forceState === 'boolean') ? forceState : !sidebar.classList.contains('active');
        sidebar.classList.toggle('active', isActive);
        overlay.classList.toggle('active', isActive);
    }

    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        toggleMenu(false);
    }

    function toggleTheme() {
        const b = document.body; const icon = document.getElementById('theme-icon');
        if(b.getAttribute('data-theme')==='light'){
            b.setAttribute('data-theme','dark'); icon.innerText='☀️';
        } else {
            b.setAttribute('data-theme','light'); icon.innerText='🌙';
        }
    }

    // 計算邏輯：完全在地執行，不依賴 API
    function getBaseDate(str) {
        if(!str || str.length < 6) return new Date();
        const yearLen = str.length - 4;
        const y = parseInt(str.substring(0, yearLen)) + 1911;
        const m = parseInt(str.substring(yearLen, yearLen + 2)) - 1;
        const d = parseInt(str.substring(yearLen + 2));
        return new Date(y, m, d);
    }

    function toROCStr(d) {
        return `${d.getFullYear()-1911}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }

    function updateDates() {
        const base = getBaseDate(document.getElementById('cite-date').value);
        let d30 = new Date(base); d30.setDate(base.getDate() + 30);
        let d45 = new Date(base); d45.setDate(base.getDate() + 45);
        document.getElementById('date-30').innerText = toROCStr(d30);
        document.getElementById('date-45').innerText = toROCStr(d45);
    }

    function updateAge() {
        const val = document.getElementById('birth-date').value;
        if(val.length < 6) return;
        const birth = getBaseDate(val); const now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        const mDiff = now.getMonth() - birth.getMonth();
        if (mDiff < 0 || (mDiff === 0 && now.getDate() < birth.getDate())) age--;
        document.getElementById('age-result').innerText = age > 0 ? age : 0;
    }

    function calcFPS() {
        const d=parseFloat(document.getElementById('d_fps').value);
        const g=parseFloat(document.getElementById('g_fps').value);
        const s=parseFloat(document.getElementById('s_fps').value);
        if(d&&g&&s) document.getElementById('res_fps').innerText=((d/g)*s*3.6).toFixed(2);
    }

    function calcSkid() {
        const d=parseFloat(document.getElementById('d_skid').value);
        const f=parseFloat(document.getElementById('f_skid_select').value);
        if(d && f) document.getElementById('res_skid').innerText = Math.sqrt(254 * d * f).toFixed(2);
    }

    function calcOver() {
        const a=parseFloat(document.getElementById('w_act').value);
        const l=parseFloat(document.getElementById('w_lim').value);
        const resOver = document.getElementById('res_over');
        const oStatus = document.getElementById('o_status');
        const oFineRow = document.getElementById('fine-row');
        const oFine = document.getElementById('o_fine');
        const oFineDetail = document.getElementById('fine-detail');
        const oLaw = document.getElementById('o_law');

        if(!a||!l) return;
        const diff = a-l; const per = (diff/l)*100;
        resOver.style.display="block";
        oStatus.innerText = diff > 0 ? `超載 ${diff.toFixed(3)} 噸 (${per.toFixed(2)}%)` : "未超載";
        
        if(diff <= 0) { oFineRow.style.display = "none"; oFineDetail.style.display = "none"; oLaw.style.display = "none"; return; }

        oFineRow.style.display = "flex"; oFineDetail.style.display = "block"; oLaw.style.display = "block";
        const chargedTons = Math.ceil(diff);
        let extra = 0;
        if (chargedTons > 30) extra = 5000;
        else if (chargedTons > 20) extra = 3000;
        else if (chargedTons > 10) extra = 2000;
        else extra = 1000;
        
        let fine = 10000 + (chargedTons * extra);
        oFine.innerText = `新臺幣 ${fine.toLocaleString()} 元`;
        oFineDetail.innerText = `明細：基本 \$10,000 + (加罰計 ${chargedTons} 噸 × \$${extra.toLocaleString()})`;

        let msg = "";
        if(per > 20) msg = "🔴 <b>超載逾 20%：</b><br>應責令當場卸貨分裝，當場禁止其通行。";
        else if(per > 10) msg = "🟡 <b>超載 10% - 20%：</b><br>應當場卸貨分裝，或責令其於二小時內改正，逾二小時不改正者，得連續舉發。";
        else msg = "🟢 <b>超載未逾 10%：</b><br>未嚴重危害交通安全、秩序，且情節輕微，以不舉發為適當。行為人發生交通事故，仍得舉發。";
        oLaw.innerHTML = msg;
    }
// 顯示法條頁面並讀取資料
async function showLawPage() {
    showPage('law-page');
    const container = document.getElementById('law-container');
    if (window.allArticles && window.allArticles.length > 0) return;

    try {
        const response = await fetch('./traffic_law.json');
        const data = await response.json();
        window.allArticles = data.LawArticles;

        // 建立頂部資訊 HTML
        const headerHtml = `
            <div class="law-info-header">
                <div style="font-weight:bold; color:var(--accent-color);">${data.LawName}</div>
                <div class="law-date-row">
                    <span>📅 修正：${data.LawModifiedDate || '2026/03/13'}</span>
                    <span>🚀 施行：${data.LawEffectiveDate || '2026/03/13'}</span>
                </div>
            </div>`;

        renderLaws(window.allArticles, headerHtml);
    } catch (e) {
        container.innerHTML = "讀取 traffic_law.json 失敗";
    }
}

// 渲染法條
function renderLaws(articles, headerHtml = "") {
    const container = document.getElementById('law-container');
    const getCircle = (n) => ["", "①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩"][n] || `${n}.`;

    const listHtml = articles.map(item => {
        // 判斷是否為「章標題」
        if (item.ArticleType === "C" || !item.ArticleNo) {
            return `<div class="law-chapter-header">${item.ArticleContent.trim()}</div>`;
        }

        // 處理條文項次
        let itemIdx = 0;
        const body = item.ArticleContent.split(/\n/).map(line => {
            const txt = line.trim();
            if (!txt || txt.includes(item.ArticleNo)) return "";
            if (/^[一二三四五六七八九十]+、/.test(txt)) {
                return `<div class="law-sub-row">${txt}</div>`;
            }
            itemIdx++;
            return `<div class="law-item-row"><span class="item-num">${getCircle(itemIdx)}</span>${txt}</div>`;
        }).join('');

        return `<div class="law-card-box">
                    <div class="law-no-header">${item.ArticleNo}</div>
                    <div style="padding:10px 0;">${body}</div>
                </div>`;
    }).join('');

    container.innerHTML = headerHtml + listHtml;
}


// 輔助函數：轉換數字為圓圈數字 (支援到 20 項，道交條例夠用了)
function getCircleNum(n) {
    const circles = ["", "①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳"];
    return circles[n] || `${n}.`;
}
          function filterLaws() {
            const term = document.getElementById('law-search-box').value.trim();
            if (!window.allArticles) return;
        
            // 如果沒輸入就顯示全部
            if (!term) {
                renderLaws(window.allArticles);
                return;
            }
        
            const filtered = window.allArticles.filter(a => 
                a.ArticleNo.includes(term) || a.ArticleContent.includes(term)
            );
        
            // 渲染過濾後的結果
            renderLaws(filtered);
        
            // [進階]：在結果中高亮關鍵字
            if (term.length >= 1) {
                const contentElems = document.querySelectorAll('.law-content, .law-no-title');
                contentElems.forEach(el => {
                    const regex = new RegExp(`(${term})`, 'gi');
                    el.innerHTML = el.innerHTML.replace(regex, '<mark style="background:#ffab40; color:#000; border-radius:2px;">$1</mark>');
                });
            }
        }
    
    updateDates();
</script>
